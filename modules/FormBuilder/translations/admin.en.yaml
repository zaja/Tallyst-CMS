# admin domain (en) — FormBuilder back-office (Orders). Auto-discovered via the bundle.
admin:
    # Sidebar items the module contributes via getAdminMenuItems() (merge into core admin.menu.*).
    menu: { forms: Forms, orders: Orders }
    module: { desc: { form_builder: 'Build forms with conditional logic; [form id=N] turns page content into a form.' } }
    order:
        entity: { singular: Order, plural: Orders }
        title: { detail: 'Order #%id%' }
        field:
            created_at: Date
            form: Form
            amount: Amount
            status: Status
            provider: Payment
            mode: Mode
            variant: Variant
            customer: Customer
            net: Net
            tax: Tax
            tax_rate: Rate (%)
            tax_name: Tax name
            submission: Form data
        status: { pending: Processing, paid: Awaiting delivery, fulfilled: Delivered, refunded: Refunded }
        mode: { test: Test, live: Live }
        action:
            mark_fulfilled: Mark delivered
            resend: Resend confirmation
            refund: Refund
            export: Export orders
            payment_dashboard: Open in payment dashboard
            back_to_list: Back to list
        confirm:
            mark_fulfilled: Mark this order as delivered?
            resend: Resend the confirmation to the customer?
            refund: Refund this order? The money is returned to the customer.
        flash:
            marked_fulfilled: 'Order #%id% marked as delivered.'
            mark_failed: 'Order #%id% can''t be marked delivered (status: %status%).'
            no_email: 'Order #%id% has no customer e-mail.'
            resent: 'The confirmation for order #%id% was resent.'
            refund_failed: 'Refund failed: %error%'
            refunded: 'Order #%id% refunded.'
            already_refunded: 'Order #%id% is already refunded.'
    form:
        flash:
            deleted: Form deleted.
            saved: Form saved.
        index:
            title: Forms
            new: + New form
            none: 'No forms yet. Create the first one, then embed it in a page with the [form id=N] shortcode.'
            col: { name: Name, status: Status, shortcode: Shortcode, fields: Fields }
            status: { published: Published, draft: Draft }
            delete: Delete
            delete_confirm: Delete this form?
        builder:
            new_title: New form
            edit_title: Edit form
            save: Save
            cancel: Cancel
            basic: { title: Basics, help: 'The form''s name, slug and status.' }
            type:
                title: Form type
                help: Determines which options below apply.
                free: Free
                free_sub: contact / sign-up
                paid: Paid (product)
                paid_sub: payment on submit
            payment:
                title: Payment
                badge: product only
                help: Price, currency, payment methods and variants.
                variants_help: 'Price variants — the buyer picks one; its price is used instead of the fixed price.'
            notify:
                title: Notifications
                help: 'E-mail notification on every submission (for free forms).'
            fields:
                title: Form fields
                help: What the visitor fills in.
            add_field: + Add field
            add_variant: + Add variant
            duplicate_keys: 'Field keys must be unique within the form. Duplicates: %keys%'
        field:
            new: New field
            required_badge: required
            move_up: Up
            move_down: Down
            remove: Remove field
            conditional_toggle: Conditional display
            conditions_legend: Display conditions (optional)
            add_rule: + Rule
            label: Field label
            key: Key
            key_help: 'Unique within the form. Empty = generated from the label.'
            type: Type
            type_option: { text: Text, email: E-mail, textarea: Long text, number: Number, select: Dropdown, checkbox: Checkbox, radio: Radio }
            placeholder: Placeholder
            required: Required
            options: Options (one per line)
            options_help: For a dropdown / radio only.
        def:
            name: Form name
            slug: Slug
            slug_help: Empty = generated from the name.
            description: Description
            status: Status
            status_option: { draft: Draft, published: Published }
            price: Price
            price_help: 'Empty = a free form. With a price the form becomes a product (payment on submit). Ignored when variants exist.'
            currency: Currency
            payment_methods: Allowed payment methods
            payment_methods_help: 'Empty = all configured. The buyer is offered the intersection of the selected and the configured.'
            notify_enabled: Send an e-mail on submission
            notify_enabled_help: Free forms only. Paid forms send an order confirmation.
            notify_recipient: Recipient(s)
            notify_recipient_help: 'E-mail; separate several with commas.'
            notify_subject: Subject (optional)
            notify_subject_help: 'Empty = "New submission: <form name>".'
        rule:
            remove: Remove rule
            op: { checked: is checked, not_checked: is not checked, equals: is, not_equals: is not, empty: is empty, not_empty: is not empty, gt: greater than, lt: less than, contains: contains }
            field_placeholder: — field —
            field_deleted: '(deleted: %key%)'
            no_options: — the field has no options (add them, or use a checkbox) —
            value_placeholder: — value —
        variant:
            remove: Remove variant
            name: Variant name
            price: Price
        payment_info:
            live_badge: LIVE MODE
            live_note: '— charges go live.'
            test_badge: TEST MODE
            test_note: '— test keys, no real charge.'
            unconfigured_badge: Not configured
            unconfigured_note: '— enter the keys (or set env variables).'
            webhook_heading: Webhook setup
            webhook_url_label: 'Webhook URL (paste into %dashboard%):'
            events_label: 'Required events:'
            guide: '%dashboard% dashboard → Webhooks → Add endpoint → paste the URL → choose events. Test/sandbox and live have SEPARATE endpoints (each with its own keys/secret).'
        webhook_check:
            header: Payments — webhook (basic-auth trap)
            intro: 'The most common go-live trap: if the webhook route sits behind basic auth, payment succeeds but the order stays "Processing" (the webhook returns 401 before the app, with no e-mails). The test sends an unsigned request to your own webhook URL — the real logic does NOT run (the signature fails with 400). 401 = a problem. Runs on demand (it doesn''t slow the admin).'
            button: Check webhook (Stripe/PayPal)
            running: Checking…
            http_error: 'Error (HTTP %status%).'
            network_error: 'Network error: %error%'
            no_results: No results.
            verdict:
                error: 'Can''t reach the URL from the app (%error%). Check manually, e.g.: curl -i -X POST %url%'
                blocked: 'Returns 401 — basic auth is probably blocking the webhook (payment succeeds but the order stays "Processing", with no e-mails). Turn off auth for this route (auth_basic off;). NOTE: if you use an IP allowlist instead of basic auth, this may be a false alarm (the call isn''t from a Stripe/PayPal IP) — check manually.'
                ok: 'Reachable (HTTP %code%) — not behind basic auth. (Code %code% is expected: the unsigned test was rejected, the real logic did not run.)'
        widget:
            revenue_month: Revenue this month
            revenue_total: Revenue total
            paid_month: Paid this month
            awaiting: Awaiting delivery
            awaiting_link: Click for the list →
            awaiting_none: Nothing pending
            revenue: Revenue
            orders: Orders
            period_7: 7 days
            period_30: 30 days
            period_365: 12 months
            from: From
            to: To
            chart_empty: No data to display.
            multi_currency: 'The chart shows the primary currency (%currency%). The other currencies are in the cards above.'
            recent: Recent orders
            no_orders: No orders yet.
            col: { date: Date, amount: Amount, status: Status, payment: Payment }
        picker:
            insert: Insert form
            title: Select a form
            close: Close
            loading: Loading…
            load_error: Couldn't load forms.
            none: No forms yet. Create one first.
            draft: draft
    condition:
        action_label: Action
        action: { show: Show the field if, hide: Hide the field if }
        match_label: Match
        match: { all: all conditions (AND), any: any condition (OR) }
        field: Field (key)
        field_placeholder: e.g. country
        operator: Operator
        value: Value
    settings:
        stripe:
            title: Stripe
            stripe_secret_key: { label: Secret key, help: 'sk_test_… or sk_live_… Empty = STRIPE_SECRET_KEY from the environment.' }
            stripe_webhook_secret: { label: Webhook secret, help: 'whsec_… from the same (test/live) endpoint. Empty = STRIPE_WEBHOOK_SECRET from the environment.' }
            checkout_locale:
                label: Checkout language
                help: 'The language of the Stripe checkout page. Automatic = follows the buyer''s browser.'
                choice: { auto: Automatic }
        paypal:
            title: PayPal
            paypal_client_id: { label: Client ID, help: 'From the PayPal app (sandbox or live). Empty = PAYPAL_CLIENT_ID from the environment.' }
            paypal_client_secret: { label: Client secret, help: 'The PayPal app''s secret. Empty = PAYPAL_CLIENT_SECRET from the environment.' }
            paypal_webhook_id: { label: Webhook ID, help: 'The webhook ID from the PayPal dashboard (needed for verification). Empty = PAYPAL_WEBHOOK_ID from the environment.' }
            paypal_mode:
                label: Mode
                help: 'PayPal has no test/live prefix in the key — choose explicitly. Sandbox and live have SEPARATE keys and webhooks.'
                choice: { sandbox: Sandbox (test), live: Live (production) }
        tax:
            title: Tax
            tax_enabled: { label: Apply tax, help: 'Applies ONE rate (included in the price) to all orders — correct for domestic sales / below the EU OSS threshold (€10,000). For sales above the threshold or global compliance, consult an accountant or a Merchant-of-Record (Paddle/Lemon Squeezy). Tallyst records data for your export; it does not file a tax return.' }
            tax_rate: { label: Rate (%), help: 'E.g. 25. Tax is INCLUDED in the price (computed backwards) — the charged amount does not change.' }
            tax_name: { label: Tax name, help: 'E.g. VAT.' }
        orders:
            title: Orders
            thank_you_message: { label: Thank-you message, help: 'Shown to the buyer on the thank-you page after a successful payment, above the order details.' }
