# admin domain (en) — FormBuilder back-office (Orders). Auto-discovered via the bundle.
admin:
    # Sidebar items the module contributes via getAdminMenuItems() (merge into core admin.menu.*).
    menu: { forms: Forms, orders: Orders }
    module: { desc: { form_builder: 'Build forms with conditional logic; [form id=N] turns page content into a form.' } }
    order:
        entity: { singular: Order, plural: Orders }
        title: { detail: 'Order #%id%' }
        field:
            created_at: Date
            form: Form
            amount: Amount
            status: Status
            provider: Payment
            mode: Mode
            variant: Variant
            shipping_method: Delivery method
            shipping_amount: Delivery amount
            shipping_address: Delivery address
            customer: Customer
            customer_name: Customer name
            customer_phone: Customer phone
            net: Net
            tax: Tax
            tax_rate: Rate (%)
            tax_name: Tax name
            dodo_tax: 'Tax (Dodo)'
            dodo_settlement: Settlement
            invoice: Invoice
            license_key: Licence key
            submission: Form data
        panel:
            shipping: Delivery
            tax: Tax
            payment: Payment
            form_data: Form data
            mor: Merchant of Record (Dodo)
            mor_help: 'Tax is calculated, collected and remitted by Dodo as the seller of record — Tallyst''s own tax figures above stay empty for these orders.'
        status: { pending: Processing, paid: Awaiting delivery, fulfilled: Delivered, refunded: Refunded }
        mode: { test: Test, live: Live }
        action:
            mark_fulfilled: Mark delivered
            resend: Resend confirmation
            refund: Refund
            export: Export orders
            payment_dashboard: Open in payment dashboard
            back_to_list: Back to list
        confirm:
            mark_fulfilled: Mark this order as delivered?
            resend: Resend the confirmation to the customer?
            refund: Refund this order? The money is returned to the customer.
        flash:
            marked_fulfilled: 'Order #%id% marked as delivered.'
            mark_failed: 'Order #%id% can''t be marked delivered (status: %status%).'
            no_email: 'Order #%id% has no customer e-mail.'
            resent: 'The confirmation for order #%id% was resent.'
            refund_failed: 'Refund failed: %error%'
            refunded: 'Order #%id% refunded.'
            already_refunded: 'Order #%id% is already refunded.'
    form:
        flash:
            deleted: Form deleted.
            saved: Form saved.
            dodo_unverified: 'Couldn''t verify "%unit%" (Dodo unreachable). Saved — but make sure it''s a fixed-price one-time product.'
        dodo_refresh:
            button: Refresh from Dodo
            confirm: 'Apply these changes from Dodo?'
            up_to_date: 'This product''s data is already up to date.'
            up_to_date_named: 'Option "%option%" is already up to date.'
            unsellable: '⚠ This product is now a subscription / usage-based / pay-what-you-want product — Tallyst can''t sell it.'
            archived: '⚠ This product is archived on Dodo.'
            not_found: 'This product no longer exists on Dodo.'
            error: 'Couldn''t reach Dodo. Nothing was changed.'
        wizard:
            title: Create a form
            intro: A couple of quick questions, then you'll fill in the details.
            default_name: Untitled form
            continue: Continue
            q1: What is this form for?
            q1_messages: Receiving messages
            q1_messages_sub: 'A contact or enquiry form — no payment.'
            q1_sells: Selling something
            q1_sells_sub: 'Take a payment when the form is submitted.'
            q2: Is a product shipped to the buyer?
            q2_physical: 'Yes — it''s shipped'
            q2_physical_sub: 'Physical goods with delivery and an address.'
            q2_digital: 'No — digital or a service'
            q2_digital_sub: 'A download, a licence, or a service you provide.'
            q3: Who handles the tax?
            q3_self: I do
            q3_self_sub: 'You charge via Stripe/PayPal and handle VAT yourself.'
            q3_mor: A provider (Merchant-of-Record)
            q3_mor_sub: 'The provider is the legal seller and handles the tax for you.'
            q3_mor_disabled: 'Configure a Merchant-of-Record provider (e.g. Dodo) in Settings first.'
            q4: Which provider?
            q4_unconfigured: 'Configure %provider% in Settings to use it.'
        index:
            title: Forms
            new: + New form
            none: 'No forms yet. Create the first one, then embed it in a page with the [form id=N] shortcode.'
            col: { name: Name, status: Status, shortcode: Shortcode, fields: Fields }
            status: { published: Published, draft: Draft }
            delete: Delete
            delete_confirm: Delete this form?
        builder:
            new_title: New form
            edit_title: Edit form
            save: Save
            cancel: Cancel
            basic: { title: Basics, help: 'The form''s name, slug and status.' }
            type:
                title: Form type
                help: Determines which options below apply.
                free: Free
                free_sub: contact / sign-up
                paid: Paid (product)
                paid_sub: payment on submit
            payment:
                title: Payment
                badge: product only
                help: Price, currency, payment methods and variants.
                variants_help: 'Price variants — the buyer picks one; its price is used instead of the fixed price.'
                price_hint: 'A paid product needs a price or at least one variant.'
                mor_units_help: 'The products the buyer chooses from. Add one for a single product, or several to offer options — the provider charges each product''s own price.'
                mor_units_price_note: 'Each option has its own price — the provider charges it. The form price below is not used.'
            notify:
                title: Notifications
                help: 'E-mail notification on every submission (for free forms).'
            fields:
                title: Form fields
                help: What the visitor fills in.
            add_field: + Add field
            add_variant: + Add variant
            add_mor_unit: + Add product
            duplicate_keys: 'Field keys must be unique within the form. Duplicates: %keys%'
            dodo_product_unsupported: 'This Dodo product is recurring or pay-what-you-want, which Tallyst can''t sell. Choose a fixed-price one-time product.'
            mor_unit_unsupported: 'Option "%unit%" is a recurring or pay-what-you-want product, which Tallyst can''t sell. Choose a fixed-price one-time product.'
        field:
            new: New field
            required_badge: required
            move_up: Up
            move_down: Down
            remove: Remove field
            conditional_toggle: Conditional display
            conditions_legend: Display conditions (optional)
            add_rule: + Rule
            label: Field label
            key: Key
            key_help: 'Unique within the form. Empty = generated from the label.'
            type: Type
            type_option: { text: Text, email: E-mail, textarea: Long text, number: Number, select: Dropdown, checkbox: Checkbox, radio: Radio }
            placeholder: Placeholder
            required: Required
            options: Options (one per line)
            options_help: For a dropdown / radio only.
        def:
            name: Form name
            slug: Slug
            slug_help: Empty = generated from the name.
            description: Description
            status: Status
            status_option: { draft: Draft, published: Published }
            form_type: What this form does
            form_type_help: 'Set when the form was created. Only Digital ↔ Merchant-of-Record can be switched here (same product, different billing). Switching never deletes your price/shipping/tax settings.'
            form_type_locked: 'The purpose is fixed. To make it a different kind of form,'
            form_type_new_form: create a new form.
            form_type_option:
                messages: Receives messages (free)
                physical: Sells a physical product (shipped)
                digital: Sells a digital product / service
                digital_mor: 'Sells digital via Merchant-of-Record (Dodo)'
            price: Price
            price_help: 'Empty = a free form. With a price the form becomes a product (payment on submit). Ignored when variants exist.'
            currency: Currency
            payment_methods: Allowed payment methods
            payment_methods_help: 'Empty = all configured providers are offered. A Merchant-of-Record method (Dodo) can''t be mixed with Stripe/PayPal — if both kinds are configured, choose explicitly.'
            shipping_methods: Delivery methods
            shipping_methods_help: 'Which delivery methods to offer at checkout (defined in Settings → Shipping). If more than one, the buyer picks one; leave all unchecked for no delivery. Delivery is added to the price and taxed at the same rate as the product.'
            shipping_none: 'No delivery methods are defined yet. Add them in Settings → Shipping.'
            shipping_countries: Ship to countries
            shipping_countries_help: 'Restrict delivery to these countries. Leave empty to ship everywhere. Applies only when the form offers delivery.'
            tax_rate: Tax rate
            tax_rate_help: 'Which tax rate applies to this product (rates are defined in Settings → Tax). Pick a named rate or “No tax”. A new form starts on the default rate. Only applies when tax is enabled.'
            tax_rate_default_suffix: default
            tax_rate_none: No tax
            countries:
                search: Search countries…
                preset_eu: EU
                preset_all: All
                preset_none: None
                selected: '%count% selected'
            dodo_product: Dodo product
            dodo_product_help: 'The Dodo product this form sells against (from your Dodo catalogue in the active test/live mode).'
            dodo_product_help_manual: 'Could not load Dodo products — enter the product ID manually.'
            dodo_product_help_no_key: 'Configure the Dodo API key in Settings → Dodo Payments to pick from your catalogue.'
            dodo_price_note: 'For Dodo forms the final price is charged by Dodo per the product''s setting — this is a display value only. Dodo may apply localized prices (per country/currency) and discounts, so the buyer''s total can differ from what''s shown here.'
            notify_enabled: Send an e-mail on submission
            notify_enabled_help: Free forms only. Paid forms send an order confirmation.
            notify_recipient: Recipient(s)
            notify_recipient_help: 'E-mail; separate several with commas.'
            notify_subject: Subject (optional)
            notify_subject_help: 'Empty = "New submission: <form name>".'
        rule:
            remove: Remove rule
            op: { checked: is checked, not_checked: is not checked, equals: is, not_equals: is not, empty: is empty, not_empty: is not empty, gt: greater than, lt: less than, contains: contains }
            field_placeholder: — field —
            field_deleted: '(deleted: %key%)'
            no_options: — the field has no options (add them, or use a checkbox) —
            value_placeholder: — value —
        variant:
            remove: Remove variant
            name: Variant name
            price: Price
        mor_unit:
            name: Option name
            unit: Product
            price: Price
            remove: Remove product
        mor_import:
            button: Import from collection
            choose: 'Collection'
            choose_placeholder: '— choose a collection —'
            products_count: '%n% products'
            name_change: 'Form name: "%old%" → "%new%"'
            description_set: 'Description will be set from the collection.'
            options_replace: 'Replace the %n% current option(s) with %m% from the collection:'
            options_add: 'Import %m% option(s):'
            skipped_title: 'Skipped (not imported):'
            reason_inactive: inactive
            reason_recurring: subscription
            reason_usage_based: usage-based
            reason_pay_what_you_want: pay-what-you-want
            empty: 'This collection has no sellable products — nothing to import.'
            error: 'Couldn''t reach Dodo. Try again.'
            apply: Import
            cancel: Cancel
        payment_info:
            live_badge: LIVE MODE
            live_note: '— charges go live.'
            test_badge: TEST MODE
            test_note: '— test keys, no real charge.'
            unconfigured_badge: Not configured
            unconfigured_note: '— enter the keys (or set env variables).'
            webhook_heading: Webhook setup
            webhook_url_label: 'Webhook URL (paste into %dashboard%):'
            events_label: 'Required events:'
            guide: '%dashboard% dashboard → Webhooks → Add endpoint → paste the URL → choose events. Test/sandbox and live have SEPARATE endpoints (each with its own keys/secret).'
        webhook_check:
            header: Payments — webhook (basic-auth trap)
            intro: 'The most common go-live trap: if the webhook route sits behind basic auth, payment succeeds but the order stays "Processing" (the webhook returns 401 before the app, with no e-mails). The test sends an unsigned request to your own webhook URL — the real logic does NOT run (the signature fails with 400). 401 = a problem. Runs on demand (it doesn''t slow the admin).'
            button: Check payment webhooks
            running: Checking…
            http_error: 'Error (HTTP %status%).'
            network_error: 'Network error: %error%'
            no_results: No results.
            verdict:
                error: 'Can''t reach the URL from the app (%error%). Check manually, e.g.: curl -i -X POST %url%'
                blocked: 'Returns 401 — basic auth is probably blocking the webhook (payment succeeds but the order stays "Processing", with no e-mails). Turn off auth for this route (auth_basic off;). NOTE: if you use an IP allowlist instead of basic auth, this may be a false alarm (the call isn''t from a Stripe/PayPal IP) — check manually.'
                ok: 'Reachable (HTTP %code%) — not behind basic auth. (Code %code% is expected: the unsigned test was rejected, the real logic did not run.)'
        widget:
            revenue_month: Revenue this month
            revenue_total: Revenue total
            paid_month: Paid this month
            awaiting: Awaiting delivery
            awaiting_link: Click for the list →
            awaiting_none: Nothing pending
            revenue: Revenue
            orders: Orders
            period_7: 7 days
            period_30: 30 days
            period_365: 12 months
            from: From
            to: To
            chart_empty: No data to display.
            multi_currency: 'The chart shows the primary currency (%currency%). The other currencies are in the cards above.'
            recent: Recent orders
            no_orders: No orders yet.
            col: { date: Date, amount: Amount, status: Status, payment: Payment }
        picker:
            insert: Insert form
            title: Select a form
            close: Close
            loading: Loading…
            load_error: Couldn't load forms.
            none: No forms yet. Create one first.
            draft: draft
    condition:
        action_label: Action
        action: { show: Show the field if, hide: Hide the field if }
        match_label: Match
        match: { all: all conditions (AND), any: any condition (OR) }
        field: Field (key)
        field_placeholder: e.g. country
        operator: Operator
        value: Value
    settings:
        stripe:
            title: Stripe
            stripe_secret_key: { label: Secret key, help: 'sk_test_… or sk_live_… Empty = STRIPE_SECRET_KEY from the environment.' }
            stripe_webhook_secret: { label: Webhook secret, help: 'whsec_… from the same (test/live) endpoint. Empty = STRIPE_WEBHOOK_SECRET from the environment.' }
            checkout_locale:
                label: Checkout language
                help: 'The language of the Stripe checkout page. Automatic = follows the buyer''s browser.'
                choice: { auto: Automatic }
        paypal:
            title: PayPal
            paypal_client_id: { label: Client ID, help: 'From the PayPal app (sandbox or live). Empty = PAYPAL_CLIENT_ID from the environment.' }
            paypal_client_secret: { label: Client secret, help: 'The PayPal app''s secret. Empty = PAYPAL_CLIENT_SECRET from the environment.' }
            paypal_webhook_id: { label: Webhook ID, help: 'The webhook ID from the PayPal dashboard (needed for verification). Empty = PAYPAL_WEBHOOK_ID from the environment.' }
            paypal_mode:
                label: Mode
                help: 'PayPal has no test/live prefix in the key — choose explicitly. Sandbox and live have SEPARATE keys and webhooks.'
                choice: { sandbox: Sandbox (test), live: Live (production) }
        dodo:
            title: Dodo Payments
            dodo_api_key: { label: API key, help: 'Your Dodo API key. Empty = DODO_API_KEY from the environment.' }
            dodo_webhook_secret: { label: Webhook secret, help: 'The signing secret from the Dodo webhook endpoint. Empty = DODO_WEBHOOK_SECRET from the environment.' }
            dodo_mode:
                label: Mode
                help: 'Dodo keys carry no test/live marker — choose explicitly. Test and live use SEPARATE keys, hosts and webhooks. Dodo is the Merchant-of-Record: it handles tax itself, so Tallyst''s tax is not applied to Dodo orders.'
                choice: { test: Test, live: Live (production) }
        tax:
            title: Tax
            tax_enabled: { label: Apply tax, help: 'Master switch. When ON, each product uses its chosen rate from the list below (or the default); a product can also be set to "no tax". When OFF, no tax is applied anywhere. Tax is INCLUDED in the price — the charged amount never changes. Tallyst records data for your export; it does not file a tax return.' }
            tax_rate: { label: Rate (%), help: 'E.g. 25. Tax is INCLUDED in the price (computed backwards) — the charged amount does not change.' }
            tax_name: { label: Tax name, help: 'E.g. VAT.' }
            intro: 'Named tax rates (each inclusive in the price). Each product picks one — or the default, marked below.'
            rate: { name: Name, rate: 'Rate (%)', default: Default }
            name_placeholder: 'e.g. VAT'
            add: Add rate
            remove: Remove
            save: Save tax rates
            flash: { saved: Tax rates saved. }
        shipping:
            title: Shipping
            intro: 'Named delivery methods with a price (tax included in the amount). Each form chooses which of these to offer at checkout; the buyer picks one if there is more than one.'
            method: { name: Name, price: 'Price (incl. tax)' }
            name_placeholder: 'e.g. Standard delivery'
            add: Add method
            remove: Remove
            save: Save shipping methods
            flash: { saved: Shipping methods saved. }
        orders:
            title: Orders
            thank_you_message: { label: Thank-you message, help: 'Shown to the buyer on the thank-you page after a successful payment, above the order details.' }
