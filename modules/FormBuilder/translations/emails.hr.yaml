# emails domain (hr) — FormBuilder order/form email defaults.
email:
    # Složeni pod-blokovi (popunjeni u PHP-u s app_locale, pa umetnuti u tijelo maila kao {tag}). Prazni
    # za digitalnu/MoR narudžbu, pa ti mailovi ostaju nepromijenjeni.
    parts:
        delivery_block: |
            Proizvod: %product%
            Dostava (%method%): %shipping%
            %tax_line%
            Adresa za dostavu:
            %address%
        tax_incl: 'Uključuje %tax_name% (%tax_rate%%): %tax_amount%'
        license_line: 'Licencni ključ: %license_key%'
        invoice_line: 'Račun: %invoice_url%'
    order_confirmation:
        label: Potvrda narudžbe (kupcu)
        subject: 'Potvrda narudžbe #{order_id}'
        body: |
            <p>Hvala na narudžbi!</p>
            <p><strong>Narudžba #{order_id}</strong><br>
            Proizvod: {form_name}<br>
            Iznos: {amount} {currency}<br>
            Status: plaćeno</p>
            <pre>{delivery_details}</pre>
            <pre>{mor_delivery}</pre>
            <p>{site_name}</p>
        tag:
            order_id: Broj narudžbe.
            amount: Iznos (formatiran, ukupno s dostavom).
            currency: Valuta.
            tax_amount: Iznos poreza (formatiran).
            net_amount: Neto iznos (bez poreza).
            tax_rate: Porezna stopa (%).
            tax_name: Naziv poreza.
            form_name: Naziv forme/proizvoda.
            variant: Odabrana varijanta (prazno ako nema).
            shipping: Odabrani način dostave i iznos (— ako nema).
            delivery_details: Razlomak dostave + adresa (prazno za digitalnu narudžbu).
            license_key: 'Licencni ključ (Dodo/MoR narudžba; inače prazno).'
            invoice_url: 'Link na račun provajdera (Dodo/MoR; inače prazno).'
            mor_delivery: 'Blok licenca + račun (prazno za ne-MoR / narudžbu bez licence).'
            site_name: Naziv sajta.
    order_admin:
        label: Nova narudžba (administratoru)
        subject: 'Nova plaćena narudžba #{order_id}'
        body: |
            <p>Nova plaćena narudžba.</p>
            <p><strong>Narudžba #{order_id}</strong><br>
            Forma: {form_name}<br>
            Iznos: {amount} {currency}<br>
            Kupac: {customer_email}</p>
            <pre>{delivery_details}</pre>
            <pre>{mor_delivery}</pre>
            <p><strong>Podaci kupca (za isporuku):</strong></p>
            <pre>{form_data}</pre>
        tag:
            order_id: Broj narudžbe.
            amount: Iznos (formatiran, ukupno s dostavom).
            currency: Valuta.
            tax_amount: Iznos poreza (formatiran).
            net_amount: Neto iznos (bez poreza).
            tax_rate: Porezna stopa (%).
            tax_name: Naziv poreza.
            form_name: Naziv forme/proizvoda.
            variant: Odabrana varijanta (prazno ako nema).
            shipping: Odabrani način dostave i iznos (— ako nema).
            delivery_details: Razlomak dostave + adresa (prazno za digitalnu narudžbu).
            license_key: 'Licencni ključ (Dodo/MoR narudžba; inače prazno).'
            invoice_url: 'Link na račun provajdera (Dodo/MoR; inače prazno).'
            mor_delivery: 'Blok licenca + račun (prazno za ne-MoR / narudžbu bez licence).'
            customer_email: E-mail kupca.
            form_data: Ostala polja koja je kupac ispunio (bez adrese — prikazana iznad).
            submission_summary: Sva polja koja je kupac ispunio u jednom ispisu (uklj. adresu).
            site_name: Naziv sajta.
    order_delivered:
        label: Narudžba isporučena (kupcu)
        subject: 'Vaša narudžba #{order_id} je isporučena'
        body: |
            <p>Dobre vijesti — vaša narudžba je isporučena.</p>
            <p><strong>Narudžba #{order_id}</strong><br>
            Proizvod: {form_name}</p>
            <p>Hvala na povjerenju!</p>
            <p>{site_name}</p>
        tag:
            order_id: Broj narudžbe.
            form_name: Naziv forme/proizvoda.
            variant: Odabrana varijanta (prazno ako nema).
            site_name: Naziv sajta.
    order_refunded:
        label: Narudžba refundirana (kupcu)
        subject: 'Povrat za narudžbu #{order_id}'
        body: |
            <p>Vaša narudžba je refundirana.</p>
            <p><strong>Narudžba #{order_id}</strong><br>
            Proizvod: {form_name}<br>
            Vraćeni iznos: {amount}</p>
            <p>Sredstva će se vratiti na vaš način plaćanja u uobičajenom roku.</p>
            <p>{site_name}</p>
        tag:
            order_id: Broj narudžbe.
            amount: Iznos (formatiran).
            form_name: Naziv forme/proizvoda.
            variant: Odabrana varijanta (prazno ako nema).
            site_name: Naziv sajta.
    form_notification:
        label: Obavijest o prijavi forme
        subject: 'Nova prijava: {form_name}'
        body: |
            <p>Nova prijava forme „{form_name}".</p>
            <pre>{submission_summary}</pre>
            <p>{site_name}</p>
        tag:
            form_name: Naziv forme.
            submission_summary: 'Sažetak prijave (polje: vrijednost).'
            site_name: Naziv sajta.
