# admin domain (en) — back-office (EasyAdmin) UI. EA's own chrome stays in the EasyAdminBundle domain.
admin:
    action:
        back_to_list: Back to list
        preview: Preview
    menu:
        dashboard: Dashboard
        pages: Pages
        posts: Posts
        categories: Categories
        menus: Menus
        menu_items: Menu items
        settings: Settings
        email_templates: E-mail templates
        users: Users
        readiness: Readiness check
        security: Security
        themes: Themes
        modules: Installed modules
        toggle_section: Toggle section
        section:
            content: Content
            sales: Sales
            navigation: Navigation
            system: System
            appearance: Appearance
            modules: Modules
    page:
        entity: { singular: Page, plural: Pages }
        field:
            title: Title
            status: Status
            content: Content
            template: Template
            meta_title: Meta title
            meta_description: Meta description
            position: Position
            hero_enabled: Hero enabled
            hero_image: Hero image
            hero_title: Hero title
            hero_text: Hero text
            hero_cta_label: CTA label
            hero_cta_url: CTA link
        status: { draft: Draft, published: Published }
        fieldset: { hero: Hero section (optional) }
        help:
            template: 'Theme template name, e.g. page.html.twig. Empty = default.'
            hero: 'A hero with text over an image, at the top of the page. Shown only when enabled and an image or title is set.'
            hero_title: 'Empty = the page title is used.'
            hero_cta_url: 'E.g. /contact or https://… The button shows only when both the label AND the link are set.'
    post:
        entity: { singular: Post, plural: Posts }
        field:
            title: Title
            status: Status
            category: Category
            author: Author
            featured_image: Featured image
            published_at: Published
            excerpt: Excerpt
            content: Content
        status: { draft: Draft, published: Published }
        help: { author: 'Defaults to you. Changeable.' }
    category:
        entity: { singular: Category, plural: Categories }
        field: { name: Name, description: Description, featured_image: Featured image }
    menu_entity:
        entity: { singular: Menu, plural: Menus }
        field: { name: Name, location: Location }
        help: { location: 'A unique location identifier, e.g. main or footer.' }
    menu_item:
        entity: { singular: Menu item, plural: Menu items }
        field: { menu: Menu, label: Label, page: Page, url: URL, parent: Parent, position: Position }
        help:
            page: 'An internal page. Takes precedence over the URL when set.'
            url: 'An external or custom URL. Used when no page is selected.'
    user:
        entity: { singular: User, plural: Users }
        field:
            email: E-mail
            nickname: Nickname (display name)
            name: Full name
            roles: Roles
            password: Password
            new_password: New password
        role: { admin: Administrator, editor: Editor }
        help:
            nickname: 'Shown as the post author. Empty = no byline.'
            name: 'Reserved — used later (e.g. billing).'
            password_new: 'Min. 8 characters.'
            password_edit: 'Leave empty to keep the current password.'
    setting:
        entity: { singular: Setting, plural: Settings }
        field: { key: Key, value: Value }
    password:
        current: Current password
        new: New password
        repeat: Repeat new password
    guard:
        lockout:
            delete_self: You can't delete your own account.
            delete_last_admin: You can't delete the last administrator.
            demote_self: You can't remove your own administrator role.
            demote_last_admin: You can't remove the last administrator role.
        theme:
            default_required: The default theme is required and can't be deleted.
            active: You can't delete the active theme.
            only: You can't delete the only theme.
    maintenance_banner:
        title: Maintenance mode is active
        note: '— the public site is unavailable to visitors.'
        link: Turn it off in Settings → Maintenance
    # Bootstrap-wired admin JS (no per-page Twig element) — set into window.__tallystI18n by the EA layout.
    js:
        dirty_guard: You have unsaved changes. Leave the page without saving?
        filepond:
            idle: 'Drag images here or <span class="filepond--label-action">browse</span>'
            type_not_allowed: Only images are allowed (JPG, PNG, WEBP, GIF).
            too_big: The file is too large.
            max_size: 'Maximum size is {filesize}.'
    dashboard:
        welcome: Welcome to Tallyst CMS.
        choose: Choose a section from the menu on the left.
        widget:
            posts: Posts
            pages: Pages
            recent_posts: Recent posts
            no_posts: No posts yet.
            col: { title: Title, status: Status, date: Date }
            status: { published: Published, draft: Draft }
    settings:
        title: Settings
        save: Save settings
        secret_unchanged: '•••• unchanged'
        smtp_unreadable: 'The SMTP password can''t be decrypted (the key changed or was lost). Mail temporarily uses MAILER_DSN from the environment. Re-enter the password and save.'
        test_mail:
            label: Send a test mail
            placeholder: name@example.com
            send: Send
            note: 'Sends via the current configuration; the result reports which transport was used.'
            subject: Tallyst — test e-mail
            body: 'This is a test message from Tallyst Settings. If you can see it, the SMTP configuration works.'
        general:
            title: General
            site_name: { label: Site name, help: Shown in the header and the title. }
            site_tagline: { label: Tagline, help: A short site description (meta description). }
            search_enabled: { label: Show the search box, help: 'A search field in the header. Off (default) = a simple site without search; turn it on if you have a lot of content.' }
        branding:
            title: Branding
            logo_media_id: { label: Logo, help: Shown in the header. Empty = the site name as text. }
            favicon_media_id: { label: Favicon, help: 'Browser-tab icon (PNG/JPG, square ~64px).' }
        blog:
            title: Blog
            blog_posts_per_page: { label: Posts per page, help: 'How many posts to show per page on the blog and archives (1–50).' }
        maintenance:
            title: Maintenance
            maintenance_enabled: { label: Maintenance mode, help: 'Visitors see a maintenance page (503); the admin keeps working and can still get in.' }
            maintenance_message: { label: Message, help: Shown to visitors while maintenance is on. }
        localization:
            title: Localization
            app_locale: { label: Language, help: The default language of the interface and translations. }
            app_timezone: { label: Time zone, help: Used for displaying dates. }
            app_date_format: { label: Date format, help: 'PHP date() format, e.g. d.m.Y.' }
        email:
            title: Email
            mail_from_name: { label: From (name), help: The name in the From field of outgoing mail. }
            mail_from_email: { label: From (e-mail), help: The address in the From field. }
            mail_reply_to: { label: Reply-To, help: Optional; replies go to this address. }
            order_admin_email: { label: Order e-mail (admin), help: 'Receives a notice about a new paid order. Empty = ORDER_ADMIN_EMAIL from the environment.' }
            smtp_host: { label: SMTP host, help: 'E.g. smtp.mailtrap.io. Empty = use MAILER_DSN from the environment.' }
            smtp_port: { label: SMTP port, help: '587 for STARTTLS, 465 for SSL.' }
            smtp_username: { label: SMTP user }
            smtp_password: { label: SMTP password, help: Encrypted. Leave empty to keep the current one. }
            smtp_encryption:
                label: Encryption
                choice: { tls: STARTTLS (tls), ssl: SSL/TLS (ssl), none: No encryption }
        footer:
            title: Footer
            footer_columns:
                label: Number of columns
                help: 'One column = text only; two = text + menu.'
                choice: { '1': 1 column, '2': 2 columns }
            footer_text: { label: Text, help: Shown in the first footer column. }
            footer_menu: { label: Menu (2nd column), help: 'An existing menu shown in the second column (when there are 2 columns).' }
            footer_copyright: { label: Copyright, help: 'Empty = automatic "© {year} {site name}".' }
            footer_show_powered_by: { label: 'Show "Powered by Tallyst CMS"' }
    theme:
        title: Themes
        intro: 'Themes are added by copying a folder into themes/ on the server (FTP / copy default and rename); the CMS detects them automatically. A theme may include a theme.png (~880×660) thumbnail.'
        none: No themes found.
        badge: { active: Active, default: Default }
        parent_label: 'parent:'
        parent_missing: 'The parent theme %name% does not exist — the theme can''t work.'
        invalid: 'Invalid theme (layout.html.twig is missing).'
        button: { activate: Activate, active: Active }
        activate_invalid_title: The theme must be valid
    module:
        title: Installed modules
        none: 'No modules installed yet. A module appears here as soon as you add it as a bundle implementing ModuleInterface.'
        col: { module: Module, version: Version, status: Status, action: Action }
        badge: { core: Core, enabled: Enabled, disabled: Disabled }
        core_locked: Part of the core — cannot be disabled
        button: { enable: Enable, disable: Disable }
    readiness:
        title: Readiness check
        intro_before: 'Automatic diagnostics of the configuration and production-readiness. The panel only reports — it changes nothing. For items the app can''t verify with certainty (worker, webhook, TLS) it shows'
        intro_after: 'with instructions — never a false green, so you can trust green.'
        manual: Check manually
        summary: '%count% checks:'
        ok: OK
        warning: warnings
        problem: problems
        manual_count: manual
        fix: 'Fix:'
        status: { ok: OK, warning: Warning, problem: Problem, manual: Check manually }
        group: { security: Security, config: Configuration, mail: Mail, assets: Assets, fs: Filesystem, db: Database, worker: Background processes }
        app_secret:
            detail: { empty: 'Empty — CSRF tokens and signed URLs are unsafe.', ok: Set. }
            fix: 'app:install generates it in .env.local; or set APP_SECRET manually to 32+ random characters.'
        enc_key:
            detail: { bad: 'Missing or invalid (needs base64 of 32 bytes) — settings encryption (the SMTP password) does not work.', ok: 'Set (32 bytes).' }
            fix: "Run app:install, or: php8.5 -r 'echo base64_encode(random_bytes(32));' → put it in .env.local."
        https:
            detail: { ok: 'DEFAULT_URI uses https. (This does not confirm real TLS on the server — check that in the browser.)', warn: 'DEFAULT_URI is not https — production should serve over HTTPS.' }
            fix: 'Set up SSL (CloudPanel/nginx) and DEFAULT_URI to https://… .'
        app_env:
            detail: { ok: Running in prod mode., dev: 'Currently "%env%". Local development is fine; for PRODUCTION set prod (dev exposes detailed errors and is slower).' }
            fix: 'In .env.local set APP_ENV=prod, then cache:clear — before the public domain goes live.'
        default_uri:
            detail:
                invalid: 'No absolute URL set — mail (password reset) and the sitemap will use http://localhost.'
                localhost: 'Set to "%uri%" — worker-generated links (password reset) will point to localhost.'
                ok: 'Set: %uri%'
            fix: { invalid: 'Set DEFAULT_URI to the real public URL (e.g. https://your-domain.com) in .env.local.', localhost: 'For production set DEFAULT_URI to the real public domain.' }
        mailer:
            label: Mail (SMTP)
            detail: { db: 'DB SMTP configured (%host%).', env: Using MAILER_DSN from the environment., unconfigured: 'Not configured — password resets and order mail will not be sent.' }
            fix: 'Settings → Email: enter the SMTP host/user/password (or set MAILER_DSN in .env.local).'
        smtp_password:
            label: SMTP password
            detail: 'Cannot be decrypted (the key was rotated/lost) — the mailer falls back to the env.'
            fix: 'Settings → Email: re-enter the SMTP password (it is re-encrypted with the current key).'
        mail_from:
            label: From address
            detail: { warn: 'mail_from_email is not set — real SMTP servers reject mail without a valid From (553).', ok: 'Set: %from%' }
            fix: 'Settings → Email: set "From (e-mail)" to an address the SMTP account is allowed to send as.'
        order_email:
            label: Order e-mail
            detail: { unset: 'Not set — order notices will not reach a real address.', placeholder: 'Set to the placeholder "%placeholder%" — order notices will not reach a real address.', ok: 'Set: %email%' }
            fix: 'Settings → Email: set "Order e-mail" to a real, deliverable address (or ORDER_ADMIN_EMAIL in .env.local).'
        assets_manifest:
            label: Compiled assets
            detail: { ok: public/assets/manifest.json exists., problem: 'public/assets/manifest.json is missing — JS/CSS is broken (dashboard chart, search, editor…).' }
            fix: 'Run: php8.5 bin/console asset-map:compile'
        theme_published:
            label: Published theme
            detail: { ok: public/themes/default exists., problem: 'public/themes/default is missing — the front has no theme CSS.' }
            fix: 'Run: php8.5 bin/console app:theme:assets:install'
        var_writable:
            label: var/ writable
            detail: { ok: The cache/log directory is writable., problem: 'var/ is not writable — cache and logs will break.' }
            fix: 'Grant rights to the web user: chmod -R u+rwX %path%'
        uploads:
            label: Upload directory
            detail: { missing: 'public/media/uploads does not exist yet (created on the first upload).', ok: public/media/uploads is writable., problem: 'public/media/uploads is not writable — image uploads will break.' }
            fix: { missing: 'Check that public/media is writable: chmod -R u+rwX %path%/public/media', problem: 'chmod -R u+rwX %path%' }
        migrations:
            label: Migrations
            detail: { error: 'Cannot check the migration state: %error%', ok: All migrations have run., pending: '%count% migration(s) not run — the database schema is outdated.' }
            fix: { error: 'Check the DB connection, then run: php8.5 bin/console doctrine:migrations:migrate', pending: 'Run: php8.5 bin/console doctrine:migrations:migrate' }
        worker:
            label: Messenger worker
            detail: { active: 'Active — last seen %seconds%s ago (heartbeat).', empty: 'The worker has not reported (heartbeat empty) — it may not be running, or it was just started/restarted and has not beaten yet.', stale: 'The worker last reported %seconds%s ago (stale) — it may have stopped.', suffix: ' Can''t confirm 100% from the app.' }
            fix: 'Check manually: systemctl --user status tallyst-messenger (restart if needed). The heartbeat refreshes while the worker runs.'
        queue:
            label: Message queue
            detail: { error: 'Cannot read the queue: %error%', failed: '%failed% failed message(s) (and %pending% pending).', backlog: '%pending% messages pending — if the number grows, the worker probably is not running.', ok: '%pending% pending, %failed% failed.' }
            fix: { error: 'Check the DB / messenger_messages table (migrations).', failed: 'See: php8.5 bin/console messenger:failed:show — then retry or remove.', backlog: 'Check that the worker is running (above).' }
    security:
        title: Security
        password: Password
        two_factor:
            heading: Two-factor authentication (2FA)
            enabled_badge: Enabled
            enabled_text: Sign-in requires a code from your authenticator app.
            disable_hint: To disable, confirm with your password.
            disable_button: Disable 2FA
            disabled_badge: Disabled
            disabled_text: Add a second factor (a code from an app) for stronger account protection.
            enable_button: Enable 2FA
        change_password:
            heading: Change password
            submit: Change password
        enable:
            title: Enable 2FA
            step1: 'Scan the QR code in an authenticator app (Google Authenticator, Authy, 1Password…).'
            step2: Enter the 6-digit code the app shows.
            qr_alt: 2FA QR code
            manual_hint: 'Can''t scan? Enter the secret key manually:'
            code_label: Code from your app
            confirm: Confirm and enable
            cancel: Cancel
        backup:
            title: Backup codes
            warning: 'Store these codes somewhere safe — they''re shown only now. Each works once and lets you sign in if you lose access to your authenticator app.'
            done: Done
    email:
        index:
            title: E-mail templates
            intro: 'Edit the subject and body of the e-mails the system sends. The defaults are used until you edit them.'
            col: { type: Type, status: Status, edited: Edited }
            badge: { enabled: Enabled, disabled: Disabled }
            overridden_yes: 'Yes'
            overridden_no: '— (default)'
            edit: Edit
        edit:
            title: 'E-mail: %label%'
            field: { subject: Subject, body: Body (HTML), enabled: Enabled }
            required_disabled: This e-mail is required and can't be disabled.
            save: Save
            back: Back
            reset: Reset to default
            reset_confirm: Reset this template to the default? Your custom text will be removed.
            tags_heading: Available tags
            tags_intro: 'Type them into the subject or body; they''re replaced with values when sending.'
            tag_required: required
            insert_tag: 'Insert: %desc%'
            toolbar:
                bold: Bold
                italic: Italic
                link: Link
                bullet_list: List
                ordered_list: Numbered list
                h2: Heading 2
                h3: Heading 3
                paragraph: Paragraph
                clear: Clear formatting
    flash:
        settings_saved: Settings saved.
        test_mail_recipient: 'Enter a recipient address (or set "Sender (e-mail)").'
        test_mail_invalid: '"%email%" is not a valid e-mail address.'
        test_mail_sent: Sent to %to% via %via%.
        test_mail_failed: 'Sending via %via% failed: %error%'
        test_mail_error: 'Error (%type%): %error%'
        password_changed: Password changed.
        two_factor_enabled: Two-factor authentication enabled.
        two_factor_disabled: Two-factor authentication disabled.
        two_factor_code_invalid: The code is incorrect. Scan the QR again and retry.
        two_factor_password_invalid: Wrong password — 2FA was not disabled.
        theme_activated: Theme "%name%" activated.
        theme_invalid: The theme is not valid or does not exist.
        email_template_saved: Template saved.
        email_reset_to_default: Template reset to the default.
        email_required_tags: 'The body must contain the required tags: %tags%'
        module_core_locked: Module "%name%" is part of the core and can't be disabled.
        module_updated: Module "%name%" updated.
