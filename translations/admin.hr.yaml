            button: Makni demo oznaku
            confirm: 'Učiniti sav demo sadržaj trajnim? Više ga nećeš moći ukloniti preko Obriši demo.'
        flash:
            installed: Demo sadržaj je instaliran.
            deleted: Demo sadržaj je obrisan.
            unflagged: Demo sadržaj je sada trajan. Uninstaler ga više neće ukloniti.
            failed: Demo naredba nije uspjela — provjeri logove servera.
            csrf: 'Nevažeći sigurnosni token, pokušaj ponovno.'
