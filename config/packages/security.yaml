security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # ROLE_ADMIN inherits ROLE_EDITOR: existing admins keep full access automatically.
    role_hierarchy:
        ROLE_ADMIN: [ROLE_EDITOR]

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: admin_login
                check_path: admin_login
                enable_csrf: true
                default_target_path: admin
            logout:
                path: admin_logout
                target: admin_login
            # Brute-force protection: throttles failed logins. Symfony registers TWO limiters —
            # local (username+IP, 5 / 15 min) AND global (IP only, 5×max = 25 / 15 min). A
            # successful login resets them. E-mail reset stays the escape hatch if locked out.
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            # TOTP 2FA (scheb): after the password, users with 2FA enabled hit the challenge
            # before full auth. The firewall is stateful (no `stateless: true`), so the
            # IS_AUTHENTICATED_2FA_IN_PROGRESS state survives in the session between steps.
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
                enable_csrf: true

    # Note: Only the *first* matching rule is applied.
    # ^/admin requires ROLE_EDITOR just to ENTER the back-office. Per-section access
    # (editor=content, admin=everything) is enforced on each controller via #[IsGranted]
    # — NOT here and NOT by hiding the menu. See CLAUDE.md "Roles & access".
    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        # Forgot-password flow must be reachable by someone who CAN'T log in — so PUBLIC,
        # and it MUST come before ^/admin (first-match) or it would demand ROLE_EDITOR.
        - { path: ^/admin/reset-password, roles: PUBLIC_ACCESS }
        # The 2FA challenge is reachable in the half-authenticated state (password OK, code
        # pending). MUST come before ^/admin (first-match) or ROLE_EDITOR would block it.
        - { path: ^/admin/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: ^/admin, roles: ROLE_EDITOR }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
