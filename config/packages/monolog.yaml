monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists

when@dev:
    monolog:
        handlers:
            main:
                # rotating_file (not a bare stream): one dated file per day, keep 7 → dev.log can no longer
                # grow unbounded (it had reached ~590 MB). Dev-only; the prod handler (stderr) is untouched.
                type: rotating_file
                max_files: 7
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                # File, NOT php://stderr: deprecations are still recorded (for a maintainer to review
                # before an EasyAdmin/Symfony major) but never spam the console or the worker's journal.
                # Real errors are unaffected — they flow through the `main`/`nested` (fingers_crossed
                # action_level: error) handler, which still writes to stderr.
                path: "%kernel.logs_dir%/deprecation.log"
                formatter: monolog.formatter.json
