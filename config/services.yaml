# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # Extension points (ShortcodeInterface / ModuleInterface) are auto-tagged via
    # #[AutoconfigureTag] on the interfaces themselves, so implementations from any
    # bundle/module are tagged — not just App\. See the interface classes.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Registries receive every tagged implementation as an iterator.
    App\Content\ShortcodeRegistry:
        arguments:
            $shortcodes: !tagged_iterator app.shortcode

    App\Module\ModuleRegistry:
        arguments:
            $modules: !tagged_iterator app.module

    # Editor shortcode<->node converters (Media [image], FormBuilder [form], …).
    App\Content\EditorContentConverter:
        arguments:
            $converters: !tagged_iterator app.editor_shortcode_converter

    # Settings layer: registry aggregates every tagged section provider; the encryptor key
    # comes from env (base64-decoded to 32 raw bytes — the real key lives in .env.local).
    App\Settings\SettingsRegistry:
        arguments:
            $providers: !tagged_iterator app.settings_section

    # Email engine: registry aggregates every tagged email-type provider (Core + modules).
    App\Email\EmailTypeRegistry:
        arguments:
            $providers: !tagged_iterator app.email_type

    App\Settings\SettingsEncryptor:
        arguments:
            $key: '%env(base64:SETTINGS_ENCRYPTION_KEY)%'

    # One source of truth for "how mail is sent": decorate the mailer transport so both
    # synchronous and async (Messenger) mail go through the admin-configured SMTP, with the
    # env MAILER_DSN as fallback. $inner is the original (env) transport.
    App\Mailer\SettingsMailerTransport:
        decorates: mailer.transports
        arguments:
            $inner: '@.inner'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
